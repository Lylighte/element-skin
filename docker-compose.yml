services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: elementskin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: elementskin
    volumes:
      - ./data/db:/var/lib/postgresql/data # 👈 数据库数据在此
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elementskin"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: always
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "password123"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "password123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: skin-backend/Dockerfile
    restart: always
    environment:
      - VITE_BASE_PATH=${VITE_BASE_PATH:-/}
      - VITE_API_BASE=${VITE_API_BASE:-/skinapi}
    args: []
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./frontend:/app/frontend           # 👈 所有静态文件在此 (自动包含 static/ 皮肤数据)
      - ./data:/app/data                   # 👈 RSA 密钥等持久化数据在此
    ports:
      - "8000:8000"
