# 主机 Nginx 配置示例
# 放置在 /etc/nginx/sites-available/element-skin 或 /etc/nginx/conf.d/element-skin.conf

# ============================================
# 方案1: 基本部署（前端 /，后端 API /skinapi）
#
# 架构说明：
#   后端 localhost:8000 以根 / 直接暴露 Yggdrasil 协议端点
#   （/authserver/authenticate, /sessionserver/... 等）
#   前端通过 /skinapi/ 调用后端 API，Nginx 转发时去掉 /skinapi 前缀
#
#   authlib-injector 客户端应配置 yggdrasil.url 为
#   https://yourdomain.com/skinapi
# ============================================
server {
    listen 80;
    server_name yourdomain.com;

    # 前端静态文件（生产模式）
    root /your/path/to/frontend;
    index index.html;

    # 后端 API 代理
    # /skinapi/authserver/authenticate → localhost:8000/authserver/authenticate
    location /skinapi/ {
        proxy_pass http://localhost:8000/;   # ← 尾部 / 去掉 /skinapi 前缀
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Union 联邦成员路由代理
    # 仅 /api/union/member/* → element-skin，主站 /api/union/diagnose 等仍走主站
    location /api/union/member/ {
        proxy_pass http://localhost:8000;    # 无尾部 / → 保持原路径不变
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 前端 SPA（兜底）
    location / {
        try_files $uri $uri/ /index.html;
    }
}

