# 主机 Nginx 配置示例
# 放置在 /etc/nginx/sites-available/element-skin 或 /etc/nginx/conf.d/element-skin.conf

# ============================================
# 方案1: 根目录部署（推荐，含 Union + Yggdrasil）
#
# element-skin 认证端点风格：所有 Yggdrasil 协议端点（/authserver, /sessionserver）
# 直接在根路径，与 authlib-injector 标准配置一致。无需子目录前缀。
#
# ⚠️ /api/yggdrasil 兼容说明：
#   此路径不是 element-skin 的标准端点，仅用于兼容 Blessing Skin 站点的查询请求。
#   其他 Blessing Skin 站点的 skinDomains 注入和前端 JS（fetchServerNames）
#   依赖此路径获取 Yggdrasil 元数据。Nginx 将其转发到 element-skin 的根 /。
#   注意：因为涉及路径重写，如果未来 Nginx 配置复杂化，此规则可能导致
#   非预期的路由错误。若出现问题，优先排查此规则。
# ============================================
server {
    listen 80;
    server_name yourdomain.com;

    # 前端静态文件目录（生产模式）
    # 开发模式可改为 proxy_pass http://localhost:3000; 并注释 try_files
    root /your/path/to/frontend;
    index index.html;

    # ─── Yggdrasil 核心认证端点（element-skin 风格，根路径）───
    # authlib-injector 客户端直接访问 /authserver/authenticate 等
    location /authserver {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /sessionserver {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Union 联邦 ───
    # Union 主站回调（服务器间通信，必须对公网可达）
    # 端点列表：/api/union/member/updatelist, /updateprivatekey, /updatebackendkey,
    #          /sync, /remapuuid, /queryemail, /diagnose, /oauth2/, /oauth2/grant
    location /api/union/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;   # Union 主站可能响应较慢
    }
    # Union 用户端（角色绑定页面）
    location /union/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Restore API（Fallback 服务器属性签名）
    location /restore {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── 后端管理 API ───
    # /admin/* 路径同时用于前端页面和 API 请求，当前规则仅代理 API
    # 页面刷新时建议由前端 SPA 处理（见 location / 的 try_files）
    location /admin/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Blessing Skin 兼容路径 ───
    # ⚠️ 此规则仅用于兼容，不是 element-skin 标准路径
    # 其他 Blessing Skin 站点通过此路径查询你的 Yggdrasil 元数据
    # 路径改写：/api/yggdrasil/authserver/authenticate → /authserver/authenticate
    # 如果出现路由异常，优先排查此规则的 rewrite 逻辑
    location /api/yggdrasil {
        proxy_pass http://localhost:8000/;   # 尾部 / 表示去掉 /api/yggdrasil 前缀
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── 前端 SPA（兜底规则，必须放在最后）───
    location / {
        try_files $uri $uri/ /index.html;
    }
}

