# Element-Skin 生产环境配置文件

jwt:
  secret: "prod-secret-please-change-to-a-very-long-string-in-production"  # ⚠️ 生产环境必须修改
  expire_days: 7
  access_expire_minutes: 30

# RSA 密钥配置
keys:
  private_key: "/app/data/private.pem"
  public_key: "/app/data/public.pem"

database:
  host: "db"
  port: "5432"
  user: "elementskin"
  password: "password123"
  name: "elementskin"
  sslmode: "disable"
  max_connections: 20

redis:
  host: "redis"
  port: "6379"
  password: "password123"
  db: 0
  key_prefix: "elementskin:"
  public_cache_ttl_seconds: 60
  auth_cache_ttl_seconds: 30

textures:
  directory: "/app/frontend/static/textures"

carousel:
  directory: "/app/frontend/static/carousel"

server:
  host: "0.0.0.0"
  port: 8000
  site_url: "http://yourdomain.com"
  api_url: "http://yourdomain.com/skinapi"

# CORS 跨域配置
cors:
  allow_origins: ["http://127.0.0.1:5173", "http://localhost:5173"]
  allow_credentials: true
