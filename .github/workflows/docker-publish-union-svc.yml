name: Docker Publish union-svc

on:
  push:
    branches: ['union-svc', 'main']
    tags: ['union-v*.*.*']
  pull_request:
    branches: ['main']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/union-svc
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check build trigger
        id: trigger-check
        shell: bash
        run: |
          should_build=false

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            should_build=true
          elif [ "${GITHUB_REF_TYPE}" = "branch" ]; then
            case "${GITHUB_REF_NAME}" in
              union-svc|main)
                should_build=true
                ;;
            esac
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            should_build=true
          fi

          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.trigger-check.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        if: steps.trigger-check.outputs.should_build == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        if: steps.trigger-check.outputs.should_build == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push Docker image
        id: build-and-push
        if: steps.trigger-check.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./union-svc
          file: union-svc/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max