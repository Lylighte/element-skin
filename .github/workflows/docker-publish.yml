name: Docker Publish

on:
  push:
    branches: [ 'dev', 'dev-next', 'main' ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # 提前启用 Node.js 24 以消除 Node.js 20 弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check build trigger
        id: trigger-check
        shell: bash
        run: |
          should_build=false

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            should_build=true
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            should_build=true
          elif [ "${GITHUB_REF_TYPE}" = "branch" ]; then
            case "${GITHUB_REF_NAME}" in
              dev|dev-next|main)
                should_build=true
                ;;
            esac
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            git fetch origin main --depth=1
            if git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"; then
              should_build=true
            else
              echo "Tag is not on main. Skipping build."
            fi
          fi

          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.trigger-check.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        if: steps.trigger-check.outputs.should_build == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        if: steps.trigger-check.outputs.should_build == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=main,enable=${{ github.ref_type == 'tag' && steps.trigger-check.outputs.should_build == 'true' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && steps.trigger-check.outputs.should_build == 'true' }}

      - name: Build and push Docker image
        id: build-and-push
        if: steps.trigger-check.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: skin-backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_MODE=standard

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag belongs to main
        id: verify
        shell: bash
        run: |
          git fetch origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag is not on main. Skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.verify.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Element Skin ${{ github.ref_name }}
          body_path: RELEASE.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
